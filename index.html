<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRIMSON FACTIONS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #dc143c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0a0b;
    color: #f2f2f3;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }
  canvas#particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 80px 20px;
    text-align: center;
  }
  .badge {
    display: inline-block;
    padding: 8px 24px;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 50px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    background: rgba(220, 20, 60, 0.1);
    margin-bottom: 20px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 78px;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(220,20,60,0.6);
    margin-bottom: 12px;
  }
  .subtitle {
    font-size: 19px;
    color: #aaa;
    margin-bottom: 50px;
  }
  .form-card {
    background: #161618;
    border: 1px solid #2a2a2e;
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  }
  .field {
    margin-bottom: 24px;
    text-align: left;
  }
  label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #ddd;
  }
  input, textarea, select {
    width: 100%;
    background: #0d0d0f;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 14px;
    color: white;
    font-size: 15.5px;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }
  textarea { min-height: 110px; resize: vertical; }
  .btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, #dc143c, #b01030);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 20px;
    transition: all 0.2s;
  }
  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(220,20,60,0.4);
  }
  footer {
    margin-top: 60px;
    color: #666;
    font-size: 14px;
  }
</style>
</head>
<body>
<canvas id="particles"></canvas>

<div class="container">
  <div class="badge">INSCRIÇÕES ABERTAS</div>
  <h1>CRIMSON FACTIONS</h1>
  <p class="subtitle">Inscreva-se para as Facções Americanas do Crimson City RP</p>

  <div class="form-card">
    <form id="applicationForm">
      <div class="field">
        <label>Nome do Personagem (IC) *</label>
        <input type="text" required>
      </div>
      <div class="field">
        <label>Discord *</label>
        <input type="text" required placeholder="seuuser#0000 ou @seuuser">
      </div>
      <div class="field">
        <label>Idade Real *</label>
        <input type="number" required>
      </div>
      <div class="field">
        <label>ID na Cidade *</label>
        <input type="text" required>
      </div>
      <div class="field">
        <label>Qual facção você deseja entrar? *</label>
        <select required>
          <option value="">Selecione uma facção</option>
          <option>The Families</option>
          <option>Ballas</option>
          <option>Vagos</option>
          <option>Lost MC</option>
          <option>Mara Salvatrucha</option>
          <option>Mafia Italiana</option>
          <option>Cartel Mexicano</option>
          <option>Outra</option>
        </select>
      </div>
      <div class="field">
        <label>Tempo de RP (meses) *</label>
        <input type="number" required>
      </div>
      <div class="field">
        <label>Por que você quer entrar nessa facção? *</label>
        <textarea required></textarea>
      </div>
      <div class="field">
        <label>Como você pretende contribuir para a facção? *</label>
        <textarea required></textarea>
      </div>
      <div class="field">
        <label>Horário disponível para jogar *</label>
        <input type="text" required placeholder="Ex: 19h às 23h">
      </div>

      <button type="submit" class="btn">ENVIAR CANDIDATURA</button>
    </form>
  </div>

  <footer>Crimson City RP © 2026 • Todas as candidaturas são analisadas pela liderança</footer>
</div>

<script>
// Partículas de fundo
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function createParticles() {
  particles = [];
  for (let i = 0; i < 90; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2.5 + 0.5,
      speedX: Math.random() * 0.5 - 0.25,
      speedY: Math.random() * 0.5 - 0.25,
      opacity: Math.random() * 0.5 + 0.2
    });
  }
}
createParticles();

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "rgba(220, 20, 60, 0.6)";

  particles.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;

    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();

// Envio fake (pode conectar no Firebase depois)
document.getElementById('applicationForm').addEventListener('submit', (e) => {
  e.preventDefault();
  alert("✅ Candidatura enviada com sucesso!\n\nA liderança vai analisar em breve.");
});
</script>
</body>
</html>
