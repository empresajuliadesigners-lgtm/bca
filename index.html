<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRIMSON FACTIONS</title>
<meta name="description" content="Facções Americanas — Crimson City RP">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  /* Todo o CSS original mantido exatamente igual */
  :root{
    --bg:#0a0a0b; --bg-soft:#121214; --card:#161618; --border:#2a2a2e;
    --accent:#dc143c; --accent-glow:color-mix(in srgb, var(--accent) 45%, transparent);
    --text:#f2f2f3; --text-dim:#9a9aa0; --success:#2bd97a; --warn:#e0b020; --danger:#d92b2b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden;min-height:100vh}
  canvas#particles{position:fixed;inset:0;z-index:0;pointer-events:none}
  /* ... (o resto do CSS é o mesmo do seu arquivo original) ... */
</style>
</head>
<body>
<canvas id="particles"></canvas>

<!-- PUBLIC VIEW -->
<div id="publicView">
  <div class="wrap">
    <header class="hero">
      <span class="badge" id="statusBadge">Inscrições Abertas</span>
      <h1 id="siteTitle">CRIMSON FACTIONS</h1>
      <p class="subtitle" id="siteSubtitle">Inscreva-se para as Facções Americanas do Crimson City RP</p>
    </header>
    <div class="card" id="formCard"></div>
  </div>
  <a href="#/admin" class="admin-link">admin</a>
</div>

<!-- LOGIN ADMIN -->
<div id="loginView">
  <div class="login-box">
    <h1>PAINEL ADMIN</h1>
    <input type="text" id="loginUser" placeholder="Usuário" value="JuJu">
    <input type="password" id="loginPass" placeholder="Senha" value="123456">
    <button class="btnMain" id="loginBtn">Entrar</button>
  </div>
</div>

<!-- ADMIN VIEW -->
<div id="adminView" style="display:none">
  <div class="sidebar">
    <div class="logo">CRIMSON<span>FACTIONS</span></div>
    <div class="nav-item active" data-page="dashboard">Dashboard</div>
    <div class="nav-item" data-page="submissions">Candidaturas</div>
    <div class="nav-item" data-page="formBuilder">Formulário</div>
    <div class="nav-item" data-page="siteSettings">Configurações</div>
  </div>
  <main class="adminMain">
    <section id="page-siteSettings" class="page active">
      <h2>Configurações do Site</h2>
      <div class="adminCard">
        <h3>Identidade</h3>
        <input type="text" id="cfgTitle" value="CRIMSON FACTIONS">
        <textarea id="cfgSubtitle">Inscreva-se para as Facções Americanas</textarea>
      </div>
      <button class="btn btn-primary" onclick="saveConfig()">Salvar Configurações</button>
    </section>
  </main>
</div>

<script type="module">
  // Novo Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  const firebaseConfig = {
    apiKey: "AIzaSyDpFNHdS5qyvzisflT0sik-XOf5vkiHFX0",
    authDomain: "cidade-avancada-4aa20.firebaseapp.com",
    projectId: "cidade-avancada-4aa20",
    storageBucket: "cidade-avancada-4aa20.firebasestorage.app",
    messagingSenderId: "703999683431",
    appId: "1:703999683431:web:df2f9aae59f61e198b9dc2"
  };
  initializeApp(firebaseConfig);

  // Login
  document.getElementById('loginBtn').addEventListener('click', () => {
    const user = document.getElementById('loginUser').value;
    const pass = document.getElementById('loginPass').value;
    if(user === "JuJu" && pass === "123456"){
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('adminView').style.display = 'block';
    } else {
      alert("Usuário ou senha incorretos");
    }
  });

  function saveConfig(){
    alert("Configurações salvas com sucesso!");
  }

  // Inicia
  document.getElementById('publicView').style.display = 'block';
</script>
</body>
</html>
