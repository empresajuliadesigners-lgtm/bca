<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRIMSON FACTIONS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0b; --bg-soft:#121214; --card:#161618; --border:#2a2a2e;
    --accent:#dc143c; --accent-glow:color-mix(in srgb, var(--accent) 45%, transparent);
    --text:#f2f2f3; --text-dim:#9a9aa0; --success:#2bd97a; --warn:#e0b020; --danger:#d92b2b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}
  canvas#particles{position:fixed;inset:0;z-index:0;pointer-events:none}
  .wrap{max-width:760px;margin:0 auto;padding:60px 20px}
  h1{font-family:'Bebas Neue',sans-serif;font-size:64px;color:var(--accent);text-shadow:0 0 50px var(--accent-glow)}
  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:32px}
  .btnMain{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),#9a0f2b);color:white;border:none;border-radius:12px;font-weight:700}
</style>
</head>
<body>
<canvas id="particles"></canvas>

<div id="publicView">
  <div class="wrap">
    <header class="hero">
      <span class="badge">INSCRIÇÕES ABERTAS</span>
      <h1>CRIMSON FACTIONS</h1>
      <p class="subtitle">Inscreva-se para as Facções Americanas do Crimson City RP</p>
    </header>
    <div class="card">
      <form>
        <div class="field"><label>Nome IC</label><input type="text"></div>
        <div class="field"><label>Discord</label><input type="text"></div>
        <div class="field"><label>Facção</label><select><option>The Families</option><option>Ballas</option></select></div>
        <button type="submit" class="btnMain">ENVIAR CANDIDATURA</button>
      </form>
    </div>
  </div>
</div>
