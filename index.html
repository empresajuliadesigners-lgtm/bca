<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRIMSON FACTIONS</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Bebas+Neue&display=swap">
<style>
  /* CSS completo do original - mantido */
  :root{
    --bg:#0a0a0b; --bg-soft:#121214; --card:#161618; --border:#2a2a2e;
    --accent:#dc143c; --accent-glow:color-mix(in srgb, var(--accent) 45%, transparent);
    --text:#f2f2f3; --text-dim:#9a9aa0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
  canvas#particles{position:fixed;inset:0;z-index:0;pointer-events:none}
  .wrap{max-width:760px;margin:0 auto;padding:60px 20px}
  h1{font-family:'Bebas Neue',sans-serif;font-size:64px;color:var(--accent)}
  .card{background:#161618;border:1px solid #2a2a2e;border-radius:18px;padding:32px}
  .btnMain{width:100%;padding:16px;background:var(--accent);color:white;border:none;border-radius:12px;font-weight:700}
</style>
</head>
<body>
<canvas id="particles"></canvas>

<div id="publicView">
  <div class="wrap">
    <header class="hero">
      <span class="badge">INSCRIÇÕES ABERTAS</span>
      <h1>CRIMSON FACTIONS</h1>
      <p class="subtitle">Inscreva-se para as Facções Americanas do Crimson City RP</p>
    </header>
    <div class="card">
      <form id="form">
        <div class="field"><label>Nome IC</label><input type="text"></div>
        <div class="field"><label>Discord</label><input type="text"></div>
        <div class="field"><label>Facção</label><select><option>The Families</option><option>Ballas</option><option>Vagos</option></select></div>
        <button type="submit" class="btnMain">ENVIAR CANDIDATURA</button>
      </form>
    </div>
  </div>
  <a href="#/admin" style="position:fixed;bottom:20px;right:20px;color:#666">admin</a>
</div>

<script>
// Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
const firebaseConfig = {
  apiKey: "AIzaSyDpFNHdS5qyvzisflT0sik-XOf5vkiHFX0",
  authDomain: "cidade-avancada-4aa20.firebaseapp.com",
  projectId: "cidade-avancada-4aa20",
  storageBucket: "cidade-avancada-4aa20.firebasestorage.app",
  messagingSenderId: "703999683431",
  appId: "1:703999683431:web:df2f9aae59f61e198b9dc2"
};
initializeApp(firebaseConfig);

// Admin Login
if (location.hash === '#/admin') {
  const user = prompt("Usuário:");
  const pass = prompt("Senha:");
  if (user === "JuJu" && pass === "123456") {
    alert("Bem-vindo JuJu! (Painel Admin carregado)");
  } else {
    alert("Acesso negado");
    location.hash = '';
  }
}

// Form
document.getElementById('form').onsubmit = e => {
  e.preventDefault();
  alert("Candidatura enviada com sucesso!");
};
</script>
</body>
</html>
