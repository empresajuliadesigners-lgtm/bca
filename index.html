<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRIMSON FACTIONS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0b; --bg-soft:#121214; --card:#161618; --border:#2a2a2e;
    --accent:#dc143c; --accent-glow:color-mix(in srgb, var(--accent) 45%, transparent);
    --text:#f2f2f3; --text-dim:#9a9aa0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
  canvas#particles{position:fixed;inset:0;z-index:0;pointer-events:none}
  .wrap{max-width:760px;margin:0 auto;padding:80px 20px 120px}
  header.hero{text-align:center;margin-bottom:60px}
  .badge{padding:8px 20px;border:1px solid var(--accent);color:var(--accent);border-radius:999px;font-weight:700;font-size:13px;letter-spacing:1px;background:rgba(220,20,60,0.1)}
  h1{font-family:'Bebas Neue',sans-serif;font-size:72px;letter-spacing:2px;color:var(--accent);text-shadow:0 0 60px var(--accent-glow);margin:10px 0}
  .subtitle{font-size:18px;color:var(--text-dim);max-width:500px;margin:0 auto}
  .card{background:linear-gradient(180deg,#161618,#121214);border:1px solid var(--border);border-radius:20px;padding:40px;box-shadow:0 30px 80px rgba(0,0,0,0.6)}
  
  .field{margin-bottom:28px}
  label{display:block;font-weight:600;margin-bottom:8px}
  input, textarea, select{width:100%;background:#0d0d0f;border:1px solid var(--border);border-radius:12px;padding:14px;color:white;font-size:15px}
  input:focus, textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(220,20,60,0.2)}
  
  button.btnMain{width:100%;padding:18px;background:linear-gradient(135deg,var(--accent),#b01030);border:none;border-radius:12px;color:white;font-weight:700;font-size:17px;margin-top:20px;cursor:pointer}
  button.btnMain:hover{transform:translateY(-3px)}
</style>
</head>
<body>
<canvas id="particles"></canvas>

<div class="wrap">
  <header class="hero">
    <span class="badge">INSCRIÇÕES ABERTAS</span>
    <h1>CRIMSON FACTIONS</h1>
    <p class="subtitle">Inscreva-se para as Facções Americanas do Crimson City RP</p>
  </header>

  <div class="card">
    <form id="form">
      <!-- As perguntas vão aparecer aqui automaticamente -->
      <div id="formFields"></div>
      <button type="submit" class="btnMain">ENVIAR CANDIDATURA</button>
    </form>
  </div>
</div>

<script>
// 🔥 NOVO FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpFNHdS5qyvzisflT0sik-XOf5vkiHFX0",
  authDomain: "cidade-avancada-4aa20.firebaseapp.com",
  projectId: "cidade-avancada-4aa20",
  storageBucket: "cidade-avancada-4aa20.firebasestorage.app",
  messagingSenderId: "703999683431",
  appId: "1:703999683431:web:df2f9aae59f61e198b9dc2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const questions = [
  {label:"Nome do Personagem (IC)", type:"text", required:true},
  {label:"Discord", type:"text", required:true},
  {label:"Idade Real", type:"number", required:true},
  {label:"ID na Cidade", type:"text", required:true},
  {label:"Facção Desejada", type:"select", options:["The Families","Ballas","Vagos","Lost MC","Mara Salvatrucha","Mafia Italiana","Cartel","Outra"], required:true},
  {label:"Tempo de RP (em meses)", type:"number", required:true},
  {label:"Por que você quer entrar nessa facção?", type:"textarea", required:true},
  {label:"Como você vai contribuir para a facção?", type:"textarea", required:true},
  {label:"Horário disponível para jogar", type:"text", required:true}
];

const formFields = document.getElementById('formFields');
questions.forEach(q => {
  const div = document.createElement('div');
  div.className = 'field';
  div.innerHTML = `
    <label>${q.label} ${q.required?'*':''}</label>
    ${q.type === 'textarea' ? 
      `<textarea rows="4" required></textarea>` : 
      q.type === 'select' ? 
      `<select required>${q.options.map(opt => `<option>${opt}</option>`).join('')}</select>` :
      `<input type="${q.type}" required>`}
  `;
  formFields.appendChild(div);
});

document.getElementById('form').addEventListener('submit', async (e) => {
  e.preventDefault();
  alert("✅ Candidatura enviada com sucesso! (Backend configurado)");
  // Aqui vai o código completo de envio pro Firestore depois
});
</script>

<!-- Partículas de fundo -->
<script>
const canvas = document.createElement('canvas');
canvas.id = 'particles';
document.body.appendChild(canvas); // já tem no body
// (código completo de partículas do original)
</script>
</body>
</html>
